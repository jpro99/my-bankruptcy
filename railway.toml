[build]
buildCommand = "corepack enable && corepack prepare pnpm@9.15.0 --activate && pnpm install && pnpm turbo run build --filter=@chapterai/api^..."
watchPatterns = ["apps/api/**", "packages/**", "railway.toml", "package.json", "pnpm-lock.yaml"]

[deploy]
startCommand = "node apps/api/dist/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
