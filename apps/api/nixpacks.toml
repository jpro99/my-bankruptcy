# Nixpacks fallback when Root Directory = apps/api
[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "cd ../.. && corepack enable && corepack prepare pnpm@9.15.0 --activate && pnpm install --frozen-lockfile"
]

[phases.build]
cmds = ["cd ../.. && pnpm turbo run build --filter=@chapterai/api"]

[start]
cmd = "node dist/server.js"
